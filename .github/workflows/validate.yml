name: Validate

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate marketplace manifest
        run: |
          jq empty .claude-plugin/marketplace.json
          echo "marketplace.json is valid JSON"

      - name: Validate all plugin manifests
        run: |
          for plugin_json in plugins/*/.claude-plugin/plugin.json; do
            echo "Checking $plugin_json..."
            jq empty "$plugin_json"
            name=$(jq -r '.name // empty' "$plugin_json")
            [ -n "$name" ] || { echo "ERROR: missing name in $plugin_json"; exit 1; }
            has_commands=$(jq 'has("commands")' "$plugin_json")
            [ "$has_commands" = "false" ] || { echo "ERROR: plugin.json must not have commands field: $plugin_json"; exit 1; }
            version=$(jq -r '.version // empty' "$plugin_json")
            [ -n "$version" ] || { echo "ERROR: missing version in $plugin_json"; exit 1; }
            echo "  OK: $plugin_json (name=$name version=$version)"
          done

      - name: Validate marketplace name-to-source consistency
        run: |
          jq -r '.plugins[] | "\(.name) \(.source)"' .claude-plugin/marketplace.json | while IFS=" " read -r name source; do
            manifest="${source}/.claude-plugin/plugin.json"
            [ -f "$manifest" ] || { echo "ERROR: source dir missing for $name: $manifest"; exit 1; }
            actual_name=$(jq -r '.name' "$manifest")
            [ "$actual_name" = "$name" ] || { echo "ERROR: name mismatch: marketplace='$name' manifest='$actual_name'"; exit 1; }
            echo "OK: $name -> $source"
          done

      - name: Validate marketplace versions match plugin.json
        run: |
          jq -r '.plugins[] | "\(.name) \(.source) \(.version // "")"' .claude-plugin/marketplace.json | \
          while IFS=" " read -r name source market_version; do
            [ -n "$market_version" ] || { echo "ERROR: marketplace entry for '$name' is missing version"; exit 1; }
            manifest="${source}/.claude-plugin/plugin.json"
            plugin_version=$(jq -r '.version' "$manifest")
            [ "$market_version" = "$plugin_version" ] || {
              echo "ERROR: version mismatch for $name: marketplace=$market_version plugin.json=$plugin_version"
              exit 1
            }
            echo "OK: $name@$market_version"
          done

      - name: Validate version bumped for changed plugins (PRs only)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          failed=0
          for plugin_dir in plugins/*/; do
            plugin_name=$(basename "$plugin_dir")
            manifest="${plugin_dir}.claude-plugin/plugin.json"
            [ -f "$manifest" ] || continue

            if ! git diff --quiet "$BASE_SHA" HEAD -- "$plugin_dir"; then
              base_version=$(git show "$BASE_SHA:$manifest" 2>/dev/null | jq -r '.version // "0.0.0"')
              current_version=$(jq -r '.version' "$manifest")

              if [ "$current_version" = "$base_version" ]; then
                echo "ERROR: $plugin_name changed but version not bumped (still $current_version)"
                failed=1
              else
                echo "OK: $plugin_name bumped $base_version -> $current_version"
              fi
            fi
          done
          [ "$failed" = "0" ] || exit 1

      - name: Check shell scripts are executable
        run: |
          # git ls-files -s emits: "<mode> <object> <stage>\t<path>" — path is tab-separated.
          while IFS=$'\t' read -r meta path; do
            mode=${meta%% *}
            [ "$mode" = "100755" ] || { echo "ERROR: $path not executable (mode $mode)"; exit 1; }
            echo "OK executable: $path"
          done < <(git ls-files -s 'plugins/**/*.sh')
          echo "All .sh scripts are executable"

      - name: Check for bundled-asset path leaks
        run: |
          if grep -rn --include="*.md" \
              -e '~/.claude/scripts/scan_perms' \
              -e '~/.claude/imps/imps-intro' \
              -e '~/.claude/imps/personas/' \
              plugins/*/commands/ 2>/dev/null; then
            echo "ERROR: bundled-asset ~/.claude/ paths found — use CLAUDE_PLUGIN_ROOT instead"
            exit 1
          fi
          echo "No bundled-asset path leaks"
