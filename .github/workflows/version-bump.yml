name: Auto-bump plugin versions

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    # Never run on bot's own bump commits — avoids infinite loop
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so we can diff against the base branch
          fetch-depth: 0
          # Use the PR head ref so we can push back to it
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect changed plugins and bump versions
        id: bump
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          changed=0

          # Start the step summary table
          {
            echo "## Plugin version bump"
            echo ""
            echo "| Plugin | Base | Branch | Action |"
            echo "|--------|------|--------|--------|"
          } >> "$GITHUB_STEP_SUMMARY"

          for plugin_dir in plugins/*/; do
            plugin_name=$(basename "$plugin_dir")
            manifest="${plugin_dir}.claude-plugin/plugin.json"
            [ -f "$manifest" ] || continue

            echo "── $plugin_name"

            if git diff --quiet "$BASE" "$HEAD" -- "$plugin_dir"; then
              echo "   no changes, skipping"
              echo "| \`$plugin_name\` | — | — | unchanged |" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            echo "   changed files:"
            git diff --name-only "$BASE" "$HEAD" -- "$plugin_dir" | sed 's/^/     · /'

            base_version=$(git show "$BASE:$manifest" 2>/dev/null | jq -r '.version // "0.0.0"')
            current_version=$(jq -r '.version' "$manifest")
            echo "   base version  : $base_version"
            echo "   branch version: $current_version"

            if [ "$current_version" = "$base_version" ]; then
              IFS='.' read -r major minor patch <<< "$current_version"
              new_version="${major}.${minor}.$((patch + 1))"
              echo "   → bumping to $new_version"

              tmp=$(mktemp)
              jq --arg v "$new_version" '.version = $v' "$manifest" > "$tmp"
              mv "$tmp" "$manifest"

              tmp=$(mktemp)
              jq --arg name "$plugin_name" --arg v "$new_version" \
                '(.plugins[] | select(.name == $name) | .version) |= $v' \
                .claude-plugin/marketplace.json > "$tmp"
              mv "$tmp" .claude-plugin/marketplace.json

              echo "| \`$plugin_name\` | $base_version | $new_version | **bumped** ✓ |" >> "$GITHUB_STEP_SUMMARY"
              changed=1
            else
              echo "   → already bumped by author, no action"
              echo "| \`$plugin_name\` | $base_version | $current_version | pre-bumped |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Commit version bumps
        if: steps.bump.outputs.changed == '1'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/*/.claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore: auto-bump plugin versions [skip ci]"
          git push
